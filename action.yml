name: "Mint QA"
description: "Run Mint QA against the current PR using a server-issued mission."
branding:
  icon: "check-circle"
  color: "green"

inputs:
  api-key:
    description: "MINT_API_KEY from your Mint dashboard."
    required: true
  mission-id:
    description: "Mission UUID dispatched by the Mint GitHub App."
    required: true
  api-base:
    description: "Override the Mint API base URL."
    required: false
    default: "https://mint-blond-six.vercel.app"
  working-directory:
    description: >
      Optional subdirectory to run Mint from. Leave empty to run at the repo
      root (default). Multi-app repos point each scoped mint.yml at its own
      workflow file, which sets this to the subdirectory the config lives in
      (e.g. "landing"). The action cd's there before invoking node, so
      mint reads .mint/product-map.json and .mint/flows/ relative to that
      directory instead of the repo root.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Playwright in action dir
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        if [ ! -f package.json ]; then
          echo '{"name":"mint-action-runtime","version":"0.0.0","private":true}' > package.json
        fi
        npm install playwright@1.50.0 --no-save --silent
        npx --yes playwright install chromium --with-deps
        # ffmpeg for the GIF preview Mint embeds in the PR comment.
        if ! command -v ffmpeg >/dev/null 2>&1; then
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
        fi

    - name: Run Mint
      shell: bash
      env:
        MINT_API_KEY: ${{ inputs.api-key }}
        MINT_MISSION_ID: ${{ inputs.mission-id }}
        MINT_API_BASE: ${{ inputs.api-base }}
        MINT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        # If working-directory is set, cd there so process.cwd() picks up
        # the per-app .mint/ files instead of the repo root. Empty string =
        # no-op (current dir is whatever the workflow set it to). Legacy
        # workflows that don't pass the input keep cwd === repo root.
        if [ -n "$MINT_WORKING_DIRECTORY" ]; then
          cd "$MINT_WORKING_DIRECTORY"
        fi
        export NODE_PATH="${{ github.action_path }}/node_modules"
        node "${{ github.action_path }}/dist/index.js"
